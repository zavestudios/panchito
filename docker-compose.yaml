services:
  db:
    # We use a postgres image which supports both amd64 & arm64 architecture
    image: postgres:16-alpine
    command: postgres -c log_statement=all
    restart: always
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER']
      interval: 3s
      retries: 5
      start_period: 30s
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - backnet
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    expose:
      - 5432

  backend:
    build:
      context: backend
      target: builder
    restart: always
    command: ["python", "-m", "flask", "run", "--host=0.0.0.0", "--port=8000"]
    ports:
      - 8000:8000
    env_file:
      - .env
    networks:
      - backnet
    environment:
      - FLASK_APP=wsgi:app
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:

networks:
  backnet:
